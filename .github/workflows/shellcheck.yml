name: ShellCheck

on:
  push:
    paths:
      - 'gitr'
  pull_request:
    paths:
      - 'gitr'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: shellcheck gitr
